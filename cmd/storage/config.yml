logger:
  level: debug
  component: storage 

listen:
  host: "0.0.0.0"
  port: 10001

store:
  max_storage: 10GB
  root_dir: ./storage_data

master:
  peers:
    - id: master0
      api_addr: master0:10000
    - id: master1
      api_addr: master1:10000
    - id: master2
      api_addr: master2:10000

transport:
  advertise_addr: localhost:10001
  frame_size: 1MB

metrics:
  scrape_port: 9100
  scrape_path: /metrics
  namespace: dos 

service:
  heartbeat_interval: 15s
  registration_timeout: 1m
  replication_timeout: 30s

  report_interval: 5s
  report_queue_capacity: 10

  max_parallel_heavy_ops: 2
