logger:
  level: debug
  service: storage 

listen:
  host: "0.0.0.0"
  port: 10001

store:
  max_storage: 10GB
  root_dir: ./chunkserver_data

transport:
  advertise_addr: localhost:10001
  master_addr: localhost:10002
  frame_size: 3MB

service:
  heartbeat_interval: 5s
  report_interval: 5s
  registration_timeout: 1m
  replication_timeout: 3m

