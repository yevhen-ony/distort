syntax = "proto3";

package master.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/master/v1;master";

service MasterClientService {
  rpc CreateObject(CreateObjectRequest) returns (CreateObjectResponse);
  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
  rpc AllocateChunk(AllocateChunkRequest) returns (AllocateChunkResponse);
  rpc GetObjectAccess(GetObjectAccessRequest) returns (GetObjectAccessResponse);
}

message ListObjectsRequest {}

message ListObjectsResponse {
  repeated ObjectItem objects = 1;
}

message ObjectItem {
  string object_id = 1;
  int64 chunk_count = 2;
}

message CreateObjectRequest {
  string object_id = 1;
}

message CreateObjectResponse {}

message AllocateChunkRequest {
  string object_id = 1;
  string chunk_key = 2;
  int64 chunk_size = 3;
}

message AllocateChunkResponse {
  ChunkPlacement chunk = 1;
}

message GetObjectAccessRequest {
  string object_id = 1;
}

message GetObjectAccessResponse {
  string object_id = 1;
  int64 total_size = 2;
  repeated ChunkPlacement chunks = 3;
}

message ChunkPlacement {
  string chunk_id = 1;
  string chunk_key = 2;
  int64 chunk_size = 3;
  repeated common.v1.NodeRef nodes = 4;
}

