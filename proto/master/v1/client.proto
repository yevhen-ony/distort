syntax = "proto3";

package master.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/master/v1;master";

service MasterClientService {
  rpc CreateObject(CreateObjectRequest) returns (CreateObjectResponse);
  rpc AllocateChunk(AllocateChunkRequest) returns (AllocateChunkResponse);
  rpc GetObjectAccess(GetObjectAccessRequest) returns (GetObjectAccessResponse);

  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
  rpc ListChunks(ListChunksRequest) returns (ListChunksResponse);
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc SetReplication(SetReplicationRequest) returns (SetReplicationResponse);
  rpc DescribeChunk(DescribeChunkRequest) returns (DescribeChunkResponse);
}

message DescribeChunkRequest {
  string chunk_id = 1;
}

message DescribeChunkResponse {
  ChunkDesc1 description = 1;
}

message SetReplicationRequest {
  string object_id = 1;
  int64 count = 2;
}

message SetReplicationResponse {
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message ListChunksRequest {}

message ListChunksResponse {
  repeated ChunkInfo chunks = 1;
}

message ListObjectsRequest {}

message ListObjectsResponse {
  repeated ObjectInfo objects = 1;
}

message NodeInfo {
  string node_id = 1;
  string addr = 2;
  int64 chunk_count = 3;
  int64 used_bytes = 4;
}

message ChunkInfo {
  string chunk_id = 1;
  int64 chunk_size = 3;
  int64 replica_count = 2;
  string object_id = 4;
}

message ObjectInfo {
  string object_id = 1;
  int64 chunk_count = 2;
  int64 replication = 3;
}

message CreateObjectRequest {
  string object_id = 1;
}

message CreateObjectResponse {}

message AllocateChunkRequest {
  common.v1.ObjectSlot object_slot = 1;
  int64 chunk_size = 2;
  repeated common.v1.NodeRef exclude_nodes = 3;
}

message AllocateChunkResponse {
  string chunk_id = 1;
  common.v1.ObjectSlot object_slot = 2;
  repeated common.v1.NodeRef targets = 3;
}

message GetObjectAccessRequest {
  string object_id = 1;
}

message GetObjectAccessResponse {
  string object_id = 1;
  int64 total_size = 2;
  repeated ChunkPlacement chunks = 3;
}

message ChunkDesc1 {
  ChunkPlacement1 placement = 1;
}

message ChunkPlacement1 {
  common.v1.ChunkMeta chunk_meta = 1;
  common.v1.ObjectSlot object_slot = 2;
  repeated common.v1.NodeRef sources = 3;
}

message ChunkPlacement {
  string chunk_id = 1;
  string chunk_key = 2;
  int64 chunk_size = 3;
  repeated common.v1.NodeRef nodes = 4;
}

