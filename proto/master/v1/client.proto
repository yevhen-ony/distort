syntax = "proto3";

package master.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/master/v1;master";

service MasterClientService {
  rpc CreateObject(CreateObjectRequest) returns (CreateObjectResponse);
  rpc AllocateChunk(AllocateChunkRequest) returns (AllocateChunkResponse);

  rpc SetReplication(SetReplicationRequest) returns (SetReplicationResponse);

  rpc DescribeObject(DescribeObjectRequest) returns (DescribeObjectResponse);
  rpc DescribeChunk(DescribeChunkRequest) returns (DescribeChunkResponse);
}

message DescribeObjectRequest {
  string object_id = 1;
}

message DescribeObjectResponse {
  ObjectDesc1 description = 1;
}

message DescribeChunkRequest {
  string chunk_id = 1;
}

message DescribeChunkResponse {
  ChunkDesc1 description = 1;
}

message SetReplicationRequest {
  string object_id = 1;
  int64 count = 2;
}

message SetReplicationResponse {
}


message CreateObjectRequest {
  string object_id = 1;
}

message CreateObjectResponse {}

message AllocateChunkRequest {
  common.v1.ObjectSlot object_slot = 1;
  int64 chunk_size = 2;
  repeated common.v1.NodeRef exclude_nodes = 3;
}

message AllocateChunkResponse {
  string chunk_id = 1;
  common.v1.ObjectSlot object_slot = 2;
  repeated common.v1.NodeRef targets = 3;
}

message ChunkDesc1 {
  ChunkPlacement1 placement = 1;
}

message ChunkPlacement1 {
  common.v1.ChunkMeta chunk_meta = 1;
  common.v1.ObjectSlot object_slot = 2;
  repeated common.v1.NodeRef sources = 3;
}

message ObjectDesc1 {
  string object_id = 1;
  int64 size = 2; 
  int64 replication = 4;
  repeated ChunkPlacement1 chunks = 5;
}

message ChunkPlacement {
  string chunk_id = 1;
  string chunk_key = 2;
  int64 chunk_size = 3;
  repeated common.v1.NodeRef nodes = 4;
}

