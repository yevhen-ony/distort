syntax = "proto3";

package master.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/master/v1;master";

service MasterStorageService {
  rpc RegisterStorageNode(RegisterStorageNodeRequest) returns (RegisterStorageNodeResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportStorage(ReportStorageRequest) returns (ReportStorageResponse);
}

message HeartbeatRequest {
  common.v1.NodeRef node_ref = 1;
}

message HeartbeatResponse {}

message ReportStorageRequest {
  string node_id = 1;
  repeated ChunkReport chunk_reports = 2;
}

message ReportStorageResponse {
  repeated string accepted_chunk_ids = 1;
  repeated string unknown_chunk_ids = 2;
}

message ChunkReport {
  string chunk_id = 1;
  common.v1.ChunkDigest chunk_digest = 2;
}

message RegisterStorageNodeRequest {
  string addr = 1;
  int64 free_bytes = 2;
  int64 used_bytes = 3;
  int32 chunk_count = 4;
}

message RegisterStorageNodeResponse {
  string node_id = 1;
}
