syntax = "proto3";

package master.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/master/v1;master";

service MasterStorageService {
  rpc RegisterStorageNode(RegisterStorageNodeRequest) returns (RegisterStorageNodeResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReportStorage(ReportStorageRequest) returns (ReportStorageResponse);
}

message HeartbeatRequest {
  string node_id = 1;
  common.v1.NodeStats stats = 2;
}

message HeartbeatResponse {
}

message ReportStorageRequest {
  string node_id = 1;
  repeated ReplicaReport reports  = 2;
}

message ReplicaReport {
  oneof report {
    ReplicaStaged staged = 1;
    ReplicaDeleted deleted = 2;
    ReplicaChainFailed chain_failed = 3;
  }
}

message ReplicaStaged {
  common.v1.ChunkMeta chunk = 1;
}

message ReplicaDeleted {
  string chunk_id = 1;
}

message ReplicaChainFailed {
  string chunk_id = 1;
  repeated common.v1.NodeRef targets = 2;
}

message ReportStorageResponse {
  repeated string accepted = 1;
  repeated string rejected = 2;
}

message RegisterStorageNodeRequest {
  string addr = 1;
}

message RegisterStorageNodeResponse {
  string node_id = 1;
}

