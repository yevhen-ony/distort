syntax = "proto3";

package common.v1;

option go_package = "dos/gen/proto/common/v1;common";

message ChunkMeta {
  string chunk_id = 1;
  common.v1.Digest digest = 2;
}

message ObjectSlot {
  string object_id = 1;
  string chunk_key = 2;
}

message NodeRef {
  string node_id = 1;
  string addr = 2;
}

message NodeStats {
  int64 free_bytes = 2;
  int64 used_bytes = 3;
  int32 chunk_count = 4;
}

message ChunkPlacement {
  string chunk_id = 1;
  repeated NodeRef nodes = 2;
}

message ChunkDesc1 {
}

message Digest {
  string Checksum = 1;
  int64 Size = 2;
}

