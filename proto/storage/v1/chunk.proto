syntax = "proto3";

package chunk.v1;

import "common/v1/types.proto";

option go_package = "dos/gen/proto/storage/v1;storage";

service ChunkService {
  rpc PutChunk(stream PutChunkRequest) returns (PutChunkResponse);
  rpc GetChunk(GetChunkRequest) returns (stream GetChunkResponse);
  rpc ReplicateChunk(ReplicateChunkRequest) returns (ReplicateChunkResponse);
  rpc DeleteChunk(DeleteChunkRequest) returns (DeleteChunkResponse);
}

message DeleteChunkRequest {
  string node_id = 1;
  string chunk_id = 2;
}

message DeleteChunkResponse {}

message ReplicateChunkRequest{
  string node_id = 1;
  string chunk_id = 2;
  repeated common.v1.NodeRef targets = 3;
}

message ReplicateChunkResponse {
}

message PutChunkRequest {
  PutChunkHeader header = 1;
  bytes data = 2;
}

message PutChunkHeader {
  string node_id = 1;
  string chunk_id = 2;
  common.v1.Digest digest = 3;
  repeated common.v1.NodeRef targets = 4;
}

message PutChunkResponse {}

message GetChunkRequest {
  string node_id = 1;
  string chunk_id = 2;
}

message GetChunkResponse {
  GetChunkHeader header = 1;
  bytes data = 2;
}

message GetChunkHeader {
  string chunk_id = 1;
  common.v1.Digest digest = 2;
}
