services:
  master:
    build:
      context: .
      dockerfile: deploy/docker/master.Dockerfile
    ports:
      - "10000:10000"

  storage:
    build:
      context: .
      dockerfile: deploy/docker/storage.Dockerfile
    depends_on:
      - master
    ports:
      - "10001:10001"
    volumes:
      - storage_data:/data
    environment:
      - TRANSPORT__MASTER_ADDR=master:10000
      - TRANSPORT__ADVERTISE_ADDR=storage:10001
      - STORE__ROOT_DIR=/data

  client:
    build:
      context: .
      dockerfile: deploy/docker/client.Dockerfile
    volumes:

volumes:
  storage_data:
