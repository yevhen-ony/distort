services:
  prometheus:      
    profiles: [main]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      
  master0:
    profiles: [main]
    image: dos-master:latest
    environment:
      - SERVICE__REPLICATION_COUNT=1
      - MASTER__SELF=master0
  
  master1:
    profiles: [main]
    image: dos-master:latest
    environment:
      - SERVICE__REPLICATION_COUNT=1
      - MASTER__SELF=master1
  
  master2:
    profiles: [main]
    image: dos-master:latest
    environment:
      - SERVICE__REPLICATION_COUNT=1
      - MASTER__SELF=master2

  storage1:
    profiles: [main]
    image: dos-storage:latest
    environment:
      - TRANSPORT__MASTER_ADDR=master:10000
      - TRANSPORT__ADVERTISE_ADDR=storage1:10001
      - STORE__ROOT_DIR=/data

  storage2:
    profiles: [main]
    image: dos-storage:latest
    ports:
      - "9101:9100"
    environment:
      - TRANSPORT__MASTER_ADDR=master:10000
      - TRANSPORT__ADVERTISE_ADDR=storage2:10001
      - STORE__ROOT_DIR=/data
  
  storage3:
    profiles: [main]
    image: dos-storage:latest
    environment:
      - TRANSPORT__MASTER_ADDR=master:10000
      - TRANSPORT__ADVERTISE_ADDR=storage3:10001
      - STORE__ROOT_DIR=/data

  client:
    profiles: [manual] 
    image: dos-client:latest
    volumes:
      - ./sandbox:/work/in
    command: ["sleep", "infinity"]

  e2e:
    profiles: [test]
    image: dos-test:latest
    command: ["pytest", "-v", "tests/e2e"]

  stress:
    profiles: [test]
    image: dos-test:latest
    command: ["python", "tests/stress/object_lifecycle.py", "--rate", "5", "--workers", "10"]



