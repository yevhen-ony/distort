services:
  prometheus:      
    profiles: [main]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      
  master-0:
    profiles: [main]
    image: dos-master:latest
    environment:
      - MASTER__SELF=master-0
      - MASTER__PEERS=master-0,master-1,master-2
      - SERVICE__REPLICATION_COUNT=${DEFAULT_REPLICATION:-1}
      - SERVICE__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - SERVICE__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
  
  master-1:
    profiles: [main]
    image: dos-master:latest
    environment:
      - MASTER__SELF=master-1
      - MASTER__PEERS=master-0,master-1,master-2
      - SERVICE__REPLICATION_COUNT=${DEFAULT_REPLICATION:-1}
      - SERVICE__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - SERVICE__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
  
  master-2:
    profiles: [main]
    image: dos-master:latest
    environment:
      - MASTER__SELF=master-2
      - MASTER__PEERS=master-0,master-1,master-2
      - SERVICE__REPLICATION_COUNT=${DEFAULT_REPLICATION:-1}
      - SERVICE__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - SERVICE__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}

  storage-0:
    profiles: [main]
    image: dos-storage:latest
    environment:
      - TRANSPORT__ADVERTISE_ADDR=storage-0:10001
      - TRANSPORT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - TRANSPORT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
      - SERVICE__HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-1s}
      - SERVICE__REPORT_INTERVAL=${REPORT_INTERVAL:-3s}
      - SERVICE__MAX_PARALLEL_HEAVY_OPS=${MAX_PARALLEL_HEAVY_OPS:-2}

  storage-1:
    profiles: [main]
    image: dos-storage:latest
    ports:
      - "9101:9100"
    environment:
      - TRANSPORT__ADVERTISE_ADDR=storage-1:10001
      - TRANSPORT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - TRANSPORT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
      - SERVICE__HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-1s}
      - SERVICE__REPORT_INTERVAL=${REPORT_INTERVAL:-3s}
      - SERVICE__MAX_PARALLEL_HEAVY_OPS=${MAX_PARALLEL_HEAVY_OPS:-2}
  
  storage-2:
    profiles: [main]
    image: dos-storage:latest
    environment:
      - TRANSPORT__ADVERTISE_ADDR=storage-2:10001
      - TRANSPORT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - TRANSPORT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
      - SERVICE__HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-1s}
      - SERVICE__REPORT_INTERVAL=${REPORT_INTERVAL:-3s}
      - SERVICE__MAX_PARALLEL_HEAVY_OPS=${MAX_PARALLEL_HEAVY_OPS:-2}

  client:
    profiles: [manual] 
    image: dos-client:latest
    volumes:
      - ./sandbox:/work/in
    command: ["sleep", "infinity"]
    environment:
      - CLIENT__CHUNK_SIZE=${CHUNK_SIZE:-10MB}
      - CLIENT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - CLIENT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}

  e2e-test:
    profiles: [test]
    image: dos-test:latest
    command: ["pytest", "-v", "tests/e2e"]
    environment:
      - CLIENT__CHUNK_SIZE=${CHUNK_SIZE:-10MB}
      - CLIENT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - CLIENT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}

  load-test:
    profiles: [test]
    image: dos-test:latest
    command: ["python", "tests/load/load.py", "--rate", "5", "--workers", "10"]
    environment:
      - CLIENT__CHUNK_SIZE=${CHUNK_SIZE:-10MB}
      - CLIENT__FRAME_SIZE=${FRAME_SIZE:-1MB}
      - CLIENT__RPC_TIMEOUT=${RPC_TIMEOUT:-10s}
