apiVersion: v1
kind: Service
metadata:
  name: storage
  namespace: dos
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: dos-storage
  ports:
    - name: grpc
      port: 10001
      targetPort: grpc
    - name: metrics
      port: 9100
      targetPort: metrics

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage
  namespace: dos
spec:
  serviceName: storage
  replicas: 3
  selector:
    matchLabels:
      app: dos-storage
  template:
    metadata:
      labels:
        app: dos-storage
    spec:
      containers:
        - name: storage
          image: dos-storage:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 10001
            - name: metrics
              containerPort: 9100
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TRANSPORT__ADVERTISE_ADDR
              value: "$(POD_NAME).storage:10001"
            - name: MASTER__PEERS
              value: "master-0.master,master-1.master,master-2.master"
            - name: TRANSPORT__FRAME_SIZE
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: FRAME_SIZE
            - name: TRANSPORT__RPC_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: RPC_TIMEOUT
            - name: SERVICE__HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: HEARTBEAT_INTERVAL
            - name: SERVICE__REPORT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: REPORT_INTERVAL
            - name: SERVICE__MAX_PARALLEL_HEAVY_OPS
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: MAX_PARALLEL_HEAVY_OPS
