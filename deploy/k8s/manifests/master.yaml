apiVersion: v1
kind: Service
metadata:
  name: master
  namespace: dos
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: dos-master
  ports:
    - name: grpc
      port: 10000
      targetPort: grpc
    - name: raft
      port: 12000
      targetPort: raft
    - name: metrics
      port: 9100
      targetPort: metrics

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: master
  namespace: dos
spec:
  serviceName: master
  replicas: 3
  selector:
    matchLabels:
      app: dos-master
  template:
    metadata:
      labels:
        app: dos-master
    spec:
      containers:
        - name: master
          image: dos-master:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 10000
            - name: raft
              containerPort: 12000
            - name: metrics
              containerPort: 9100
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MASTER__SELF
              value: "$(POD_NAME).master"
            - name: MASTER__PEERS
              value: "master-0.master,master-1.master,master-2.master"
            - name: SERVICE__REPLICATION_COUNT
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: DEFAULT_REPLICATION
            - name: SERVICE__FRAME_SIZE
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: FRAME_SIZE
            - name: SERVICE__RPC_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: dos-config
                  key: RPC_TIMEOUT
