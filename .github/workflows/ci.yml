name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  e2e:
    name: Docker e2e
    runs-on: ubuntu-latest
    needs: go
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          make build
          make build-test

      - name: Start cluster
        run: make up

      - name: Wait for cluster
        run: make wait 

      - name: Run e2e tests
        run: make e2e

      - name: Stop cluster
        if: always()
        run: make down
